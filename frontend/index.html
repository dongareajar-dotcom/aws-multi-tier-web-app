<!DOCTYPE html>
<html>
<head>
  <title>AWS Frontend</title>
</head>
<body>
  <h1>Frontend Running on EC2 🚀</h1>

  <button onclick="callAPI()">Call Backend</button>

  <p id="result"></p>

  <script>
    async function callAPI() {
      const res = await fetch("http://YOUR-BACKEND-IP:8000/");
      const data = await res.json();
      document.getElementById("result").innerText = JSON.stringify(data);
    }
  </script>
</body>
</html>
